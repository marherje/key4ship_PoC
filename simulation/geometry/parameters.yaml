# ---------------------------------------------------------------------------
# Geometry parameters for the SND detector.
#
# Edit this file and run:   python3 config.py          (from this directory)
# to apply the values to SND_compact.xml. Both the ddsim simulation and the
# reconstruction (ACTSGeoSvc, parse_geometry) read that XML, so one apply
# reconfigures the whole chain — no steering-file changes needed.
#
# z positions are in mm, DD4hep frame (z = beam axis), and refer to the
# CENTRE of the detector envelope. Use `auto` to keep the default derived
# placement:
#   sitarget : immediately upstream of SiPad (SiTarget_dim_z = 1502mm - SiPad_dim_z)
#   sipad    : silicon-pad calorimeter, centred at z = -SiPad_dim_z/2
#   mtc      : station 1 starts after SiPad; stations 2 and 3 chain one
#              after another with MTC_inter_station_gap
#
# NOTE: sitarget.n_layers / sipad.n_layers below are NOT applied by this
# script anymore — SiTarget_NLayers and SiPad_NLayers are now derived in
# SND_compact.xml as floor(dim_z/LayerThickness), not free parameters.
# Only mtc.n_layers (MTC_NLayers) and the z_position overrides are patched.
# ---------------------------------------------------------------------------

sitarget:
  n_layers: 30    # informational only; not patched, see NOTE above
  z_position: auto

sipad:            # silicon-pad calorimeter
  n_layers: 10    # informational only; not patched, see NOTE above
  z_position: auto

mtc:
  n_layers: 20    # per station — the 3 stations share the layer template
  stations:
    MTC40:
      z_position: auto
    MTC50:
      z_position: auto
    MTC60:
      z_position: auto
